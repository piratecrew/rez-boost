sudo: required
dist: trusty

language: cpp

cache:
    directories:
      $HOME/rez
      $HOME/packages
env:
  global:
    - OVERRIDE_BOOST_MODULES="--with-python"
    - REZ_REPO_PAYLOAD_DIR="/tmp/REPO"
  matrix:
    - VERSION=1.70.0
    - VERSION=1.69.0
    - VERSION=1.68.0
    - VERSION=1.67.0
    - VERSION=1.66.0
    - VERSION=1.65.1
    - VERSION=1.64.0
    - VERSION=1.63.0
    - VERSION=1.62.0
    - VERSION=1.61.0
    - VERSION=1.60.0
    - VERSION=1.59.0
    - VERSION=1.58.0
    - VERSION=1.57.0
    - VERSION=1.56.0
    - VERSION=1.55.0

before_install:
  - sudo apt-get -qq update

before_cache:
  - rm -rf $HOME/packages/boost

jobs:
  include:
    - stage: precache
      script: true
      install:
        - git clone https://github.com/nerdvegas/rez.git
        - cd rez
        - python ./install.py -v $HOME/rez
        - cd ..
        - export PATH=/tmp/rez/bin/rez:$PATH
        - mkdir -p $HOME/packages
        - rez-bind platform
        - rez-bind arch
        - rez-bind os
        - rez-bind python
        - git clone https://github.com/piratecrew/rez-python.git
        - cd rez-python
        - rez-build -i
        - cd ..
    - stage: build  
      script:
        - mkdir -p ${REZ_REPO_PAYLOAD_DIR}
        - (cd ${REZ_REPO_PAYLOAD_DIR}; curl -L http://downloads.sourceforge.net/project/boost/boost/${VERSION}/boost_$(echo ${VERSION} | tr "." "_").tar.gz)
        - sed -i s/version.*=.*/version=\"${VERSION}\"/ package.py
        - rez-build -i